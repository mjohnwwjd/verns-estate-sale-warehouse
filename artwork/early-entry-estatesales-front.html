<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vern Estate Sale Early Sign-Up Front Card</title>
    <style>
      :root {
        --ink: #11100e;
        --black: #070706;
        --gold: #f4c641;
        --cream: #fff7dc;
        --red: #cf1f32;
        --shadow: rgba(0, 0, 0, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 900px;
        margin: 0;
        overflow: hidden;
        background: var(--black);
      }

      body {
        display: grid;
        place-items: center;
        font-family: Impact, "Arial Black", Arial, sans-serif;
        color: var(--cream);
      }

      .card {
        position: relative;
        display: grid;
        align-content: start;
        justify-items: center;
        width: 1200px;
        height: 900px;
        overflow: hidden;
        border: 14px solid var(--gold);
        border-radius: 18px;
        background:
          radial-gradient(circle at 50% 16%, rgba(244, 198, 65, 0.24), transparent 18%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 18%),
          repeating-linear-gradient(0deg, rgba(244, 198, 65, 0.08) 0 2px, transparent 2px 9px),
          linear-gradient(135deg, #15140f 0%, #070706 54%, #19140b 100%);
        box-shadow: inset 0 0 0 5px rgba(244, 198, 65, 0.5), inset 0 0 0 20px rgba(0, 0, 0, 0.35);
      }

      .inner-line {
        position: absolute;
        inset: 28px;
        border: 2px solid rgba(244, 198, 65, 0.42);
        border-radius: 14px;
        pointer-events: none;
      }

      .brand-logo {
        width: 190px;
        height: 190px;
        margin-top: 28px;
        border: 7px solid var(--gold);
        border-radius: 14px;
        background: var(--ink);
        box-shadow: 13px 13px 0 var(--shadow);
        object-fit: cover;
      }

      .brand-title {
        margin-top: 14px;
        color: var(--gold);
        font-size: 48px;
        line-height: 0.9;
        text-align: center;
        text-shadow: 0 5px 0 #000;
      }

      .headline {
        margin-top: 22px;
        text-align: center;
        text-transform: uppercase;
      }

      .headline .early {
        display: block;
        color: var(--cream);
        font-size: 116px;
        line-height: 0.72;
        letter-spacing: 0;
        -webkit-text-stroke: 4px #000;
        text-shadow: 0 8px 0 #000, 0 18px 24px rgba(0, 0, 0, 0.55);
      }

      .headline .signup {
        display: block;
        color: var(--gold);
        font-size: 132px;
        line-height: 0.78;
        letter-spacing: 0;
        -webkit-text-stroke: 4px #000;
        text-shadow: 0 8px 0 #000, 0 18px 24px rgba(0, 0, 0, 0.55);
      }

      .message-panel {
        display: grid;
        justify-items: center;
        width: 960px;
        margin-top: 18px;
        border: 7px solid var(--gold);
        border-radius: 18px;
        background: var(--cream);
        padding: 22px 36px 21px;
        color: var(--ink);
        text-align: center;
        box-shadow: 10px 10px 0 #000;
      }

      .message-panel strong {
        display: block;
        font-size: 52px;
        line-height: 0.92;
      }

      .message-panel span {
        display: block;
        margin-top: 12px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 34px;
        font-weight: 1000;
        line-height: 1.05;
      }

      .url {
        display: block;
        margin-top: 10px;
        color: var(--red);
        font-family: Impact, "Arial Black", Arial, sans-serif;
        font-size: 54px;
        line-height: 0.95;
      }

      .bottom-cta {
        margin-top: 26px;
        border: 6px solid var(--gold);
        border-radius: 16px;
        background: var(--red);
        padding: 15px 116px 13px;
        color: var(--cream);
        font-size: 48px;
        line-height: 0.88;
        text-align: center;
        text-shadow: 0 4px 0 #000;
        box-shadow: 8px 8px 0 #000;
      }

      .corner {
        position: absolute;
        bottom: 26px;
        width: 0;
        height: 0;
        border-left: 35px solid transparent;
        border-right: 35px solid transparent;
        border-top: 60px solid var(--gold);
      }

      .corner.left {
        left: 42px;
      }

      .corner.right {
        right: 42px;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-label="Vern Estate Sale early sign-up front card">
      <div class="inner-line"></div>
      <img class="brand-logo" src="../assets/img/logo-vern-option-2.png" alt="Vern Estate Sale logo" />
      <div class="brand-title">VERN ESTATE SALE</div>
      <div class="headline" aria-label="Early sign-up">
        <span class="early">Early</span>
        <span class="signup">Sign-Up</span>
      </div>
      <div class="message-panel">
        <strong>FOR THIS SALE</strong>
        <span>Sign up now at</span>
        <b class="url">estatesbyvern.com</b>
      </div>
      <div class="bottom-cta">$20 WAVE 2 · SPOTS 21-40</div>
      <div class="corner left"></div>
      <div class="corner right"></div>
    </main>
  </body>
</html>
